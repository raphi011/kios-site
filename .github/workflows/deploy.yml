name: build-and-deploy
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Build and push arm64 image to Zot
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --provenance=false --sbom=false \
            --tag zot.manx-turtle.ts.net/kios-web:${{ steps.tag.outputs.tag }} \
            --tag zot.manx-turtle.ts.net/kios-web:latest \
            --push .

      - name: Bump image tag in turingpi-k8s
        env:
          GH_TOKEN: ${{ secrets.TURINGPI_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/raphi011/turingpi-k8s.git infra
          cd infra
          sed -i "s|image: 10.108.73.22:5000/kios-web:.*|image: 10.108.73.22:5000/kios-web:${{ steps.tag.outputs.tag }}|" manifests/kios-web/deployment.yaml
          git config user.name "kios-web-ci"
          git config user.email "ci@kios.raphi011.dev"
          git commit -am "chore(kios-web): deploy ${{ steps.tag.outputs.tag }}" || echo "no change"
          git push
