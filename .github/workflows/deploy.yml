name: build-and-deploy
on:
  push:
    branches: [main]
permissions:
  contents: read

env:
  REGISTRY: zot.manx-turtle.ts.net
  IMAGE: kios-web

jobs:
  build:
    # Native arm64 runner: no QEMU/buildx needed, and host-level docker
    # build/push sees /etc/hosts directly (mirrors raphi011/know's deploy).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Set image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          # Keep system DNS so Docker Hub still resolves; reach Zot via /etc/hosts.
          args: --accept-dns=false

      - name: Add Zot registry to /etc/hosts
        run: |
          ZOT_IP=$(tailscale ip -4 zot)
          echo "$ZOT_IP ${{ env.REGISTRY }}" | sudo tee -a /etc/hosts

      - name: Build image (native arm64)
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest \
            .

      - name: Push image to Zot
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest

      - name: Bump image tag in turingpi-k8s
        env:
          GH_TOKEN: ${{ secrets.TURINGPI_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/raphi011/turingpi-k8s.git infra
          cd infra
          sed -i "s|image: 10.108.73.22:5000/kios-web:.*|image: 10.108.73.22:5000/kios-web:${{ steps.tag.outputs.tag }}|" manifests/kios-web/deployment.yaml
          git config user.name "kios-web-ci"
          git config user.email "ci@kios.raphi011.dev"
          git commit -am "chore(kios-web): deploy ${{ steps.tag.outputs.tag }}" || echo "no change"
          git push
